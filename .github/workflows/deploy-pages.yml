name: GitHub Pagesへデプロイ

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: GitHub Pagesへデプロイ
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: jsut_hihoを取得
        uses: actions/checkout@v4
        with:
          repository: Hiroshiba/jsut_hiho
          path: hiho_clone/jsut_hiho

      - name: voiceactress100_rubyを取得
        uses: actions/checkout@v4
        with:
          repository: Hiroshiba/voiceactress100_ruby
          path: hiho_clone/voiceactress100_ruby

      - name: uvを設定
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: 依存関係を同期
        run: uv sync --locked

      - name: 静的HTMLを生成
        run: uv run basic5000-ruby-build

      - name: GitHub Pagesを設定
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Pages成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: GitHub Pagesへデプロイ
        id: deploy
        uses: actions/deploy-pages@v4
